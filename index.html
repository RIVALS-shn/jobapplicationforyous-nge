<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solara Elite Application</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { border: 1px solid #00ff41; padding: 40px; background: rgba(0, 255, 65, 0.05); box-shadow: 0 0 25px rgba(0, 255, 65, 0.3); border-radius: 15px; max-width: 450px; width: 90%; text-align: center; }
        h1 { font-size: 1.6rem; text-shadow: 0 0 10px #00ff41; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #fff; text-align: left; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; background: #111; border: 1px solid #00ff41; color: #00ff41; border-radius: 5px; box-sizing: border-box; font-size: 1rem; }
        .btn-submit { display: block; width: 100%; margin-top: 25px; padding: 15px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; }
        .btn-submit:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        
        /* Sectiunile care stau ascunse la inceput */
        #loading, #downloadSection { display: none; }

        .loader { border: 5px solid #111; border-top: 5px solid #00ff41; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-download { display: inline-block; margin-top: 20px; padding: 18px 40px; background: #00ff41; color: #000; text-decoration: none; font-weight: bold; border-radius: 8px; font-size: 1.2rem; }
        .btn-download:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <!-- PASUL 1: Formularul de Aplicatie (Apare primul) -->
        <div id="formSection">
            <h1>SOLARA APPLICATION</h1>
            <label>Nume de utilizator:</label>
            <input type="text" placeholder="Numele tau...">
            
            <label>De ce vrei sa folosesti Solara?</label>
            <select id="reason">
                <option>Vreau sa fac auto-farm (AFK)</option>
                <option>Să testez scripturi noi .lua</option>
                <option>Vreau sa zbor (Fly hack)</option>
            </select>

            <label>Mesaj pentru admin:</label>
            <textarea rows="3" placeholder="De ce sa te alegem pe tine?"></textarea>

            <button type="button" class="btn-submit" onclick="startProcess()">TRIMITE APLICAȚIA</button>
        </div>

        <!-- PASUL 2: Mesajul de asteptare (Apare dupa ce apasa butonul) -->
        <div id="loading">
            <h1 style="color: #fff;">ASTEAPTA...</h1>
            <p>Se verifica datele si se genereaza link-ul securizat...</p>
            <div class="loader"></div>
            <p id="timer" style="font-weight: bold;">Timp ramas: 4s</p>
        </div>

        <!-- PASUL 3: Link-ul final (Apare dupa 4 secunde) -->
        <div id="downloadSection">
            <h1 style="color: #fff;">✅ ACCES APROBAT</h1>
            <p>Poti descarca Solara acum de pe link-ul oficial:</p>
            <a href="https://getsolara.dev" target="_blank" class="btn-download">GET SOLARA EXECUTOR</a>
            <p style="margin-top: 25px; font-size: 0.8rem; color: #444;">Status: Session Verified</p>
        </div>
    </div>

    <script>
        function startProcess() {
            // Ascundem tot formularul
            document.getElementById('formSection').style.display = 'none';
            // Afisam sectiunea de incarcare
            document.getElementById('loading').style.display = 'block';

            // Cronometru vizual pentru cele 4 secunde
            let timeLeft = 4;
            let timerElement = document.getElementById('timer');
            let interval = setInterval(function() {
                timeLeft--;
                timerElement.innerText = "Timp ramas: " + timeLeft + "s";
                if (timeLeft <= 0) clearInterval(interval);
            }, 1000);

            // Dupa fix 4 secunde (4000ms), aratam sectiunea de download
            setTimeout(function() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('downloadSection').style.display = 'block';
            }, 4000);
        }
    </script>

</body>
</html>
